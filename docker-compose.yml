version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: aibot_postgres
    environment:
     POSTGRES_USER: postgres
     POSTGRES_PASSWORD: postgres
     POSTGRES_DB: aibotdb
    ports:
      - "5432:5432"


  redis:
    image: redis:7
    container_name: aibot_redis
    ports:
      - "6379:6379"



